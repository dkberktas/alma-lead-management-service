services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alma
      POSTGRES_PASSWORD: alma_dev_password
      POSTGRES_DB: alma_leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alma -d alma_leads"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/code/app
      - ./uploads:/code/uploads
      - ~/.aws:/root/.aws:ro
    stop_grace_period: 35s
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
